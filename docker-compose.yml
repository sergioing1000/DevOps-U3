services:

  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped

    ports:
      - "8081:8080"
      - "50000:50000"

    volumes:
      - infra_jenkins_home:/var/jenkins_home

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    restart: unless-stopped

    ports:
      - "9000:9000"

    volumes:
      - frontend_sonarqube_data:/opt/sonarqube/data
      - frontend_sonarqube_logs:/opt/sonarqube/logs
      - frontend_sonarqube_extensions:/opt/sonarqube/extensions

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    restart: unless-stopped

    ports:
      - "9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

volumes:
  infra_jenkins_home:
    external: true

  frontend_sonarqube_data:
    external: true

  frontend_sonarqube_logs:
    external: true

  frontend_sonarqube_extensions:
    external: true

  grafana_data: